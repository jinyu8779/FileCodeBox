# =============================================================================
# FileCodeBox 配置文件
# -----------------------------------------------------------------------------
# 说明：
#   1. 修改后一般需重启服务生效；管理后台保存配置会回写本文件。
#   2. 多数开关类字段：0=关闭，1=开启。
#   3. 大小类字段单位为「字节」（Bytes），例如 10485760 = 10MB。
#   4. 环境变量可覆盖部分项：PORT、DATA_PATH、ENABLE_MCP_SERVER、MCP_PORT、MCP_HOST。
#   5. 键名请保持下方写法（部分为全小写连写，部分带下划线），勿随意改成其它命名。
# =============================================================================

# -----------------------------------------------------------------------------
# base：站点基础与服务监听
# -----------------------------------------------------------------------------
base:
    # 站点名称（显示在页面标题等处）
    # 类型：字符串；建议不超过 100 字
    name: 站点

    # 站点描述（SEO / 页面副标题等）
    # 类型：字符串
    description: 开箱即用的文件快传系统

    # 站点关键词（SEO，逗号分隔）
    # 类型：字符串
    keywords: FileCodeBox, 文件快递柜, 口令传送箱, 匿名口令分享文本, 文件

    # HTTP 服务监听端口
    # 类型：整数；范围 1–65535
    # 可被环境变量 PORT 覆盖
    port: 12345

    # 监听地址
    # 可选：
    #   0.0.0.0  — 监听所有网卡（默认，外网可访问需配合防火墙）
    #   127.0.0.1 — 仅本机访问
    #   其它合法 IPv4/IPv6
    # 注意：需填写 IP，不支持主机名
    host: 0.0.0.0

    # 数据根目录（数据库、本地文件等默认落在此目录体系下）
    # 类型：路径字符串；可被环境变量 DATA_PATH 覆盖
    # 示例：./data  或  /var/lib/filecodebox/data
    datapath: /Users/zhangyi/FileCodeBox/data

    # 是否生产模式
    # 可选：
    #   false — 开发模式（更详细的调试日志）
    #   true  — 生产模式（Release + 精简日志）
    production: false

# -----------------------------------------------------------------------------
# database：数据库
# -----------------------------------------------------------------------------
database:
    # 数据库类型
    # 可选：
    #   sqlite   — 单文件库，适合个人/小流量（默认）
    #   mysql    — MySQL / MariaDB
    #   postgres — PostgreSQL
    type: sqlite

    # 数据库主机（sqlite 可忽略）
    host: ""

    # 数据库端口（sqlite 可忽略）
    # 常见：MySQL 3306、PostgreSQL 5432
    port: 0

    # 数据库名 / SQLite 时多为库文件路径提示字段
    # 注意：当前实现里 sqlite 连接路径可能固定使用 ./data/filecodebox.db，
    #       以实际运行与 datapath 为准；mysql/postgres 时填写库名
    name: ./data/filecodebox.db

    # 数据库用户名（sqlite 可忽略）
    user: ""

    # 数据库密码（sqlite 可忽略）
    pass: ""

    # SSL 模式（主要用于 postgres）
    # 可选：
    #   disable     — 不使用 SSL
    #   require     — 要求 SSL
    #   verify-full — SSL 并校验证书
    ssl: disable

# -----------------------------------------------------------------------------
# transfer：上传 / 下载
# -----------------------------------------------------------------------------
transfer:
    # ----- 上传 -----
    upload:
        # 是否开放上传
        # 可选：0=关闭上传，1=开启上传
        openupload: 1

        # 单文件大小上限（字节）
        # 示例：10485760=10MB，52428800=50MB，104857600=100MB
        # 范围建议：0–10GB
        uploadsize: 10485760

        # 是否启用分片上传（大文件/断点续传相关）
        # 可选：0=关闭，1=开启
        # 注意：通常仅本地存储(local)时真正生效
        enablechunk: 1

        # 分片大小（字节）；仅 enablechunk=1 时有意义
        # 建议：1MB–100MB，且不要大于 uploadsize
        # 示例：2097152=2MB
        chunksize: 2097152

        # 文件最大保存时长（秒）
        # 可选：
        #   0  — 不限制（由分享过期设置决定）
        #   >0 — 最长保存秒数（如 86400=1天）
        maxsaveseconds: 0

        # 上传是否必须登录
        # 可选：
        #   0 — 允许匿名上传
        #   1 — 必须登录后才能上传
        requirelogin: 1

        # 文件夹上传时，单次最多文件数
        # 可选：
        #   0      — 不限制
        #   1–100000 — 具体上限（超过则拒绝上传）
        max_folder_files: 100

        # 上传成功后返回给用户的内容类型
        # 可选：
        #   code — 返回提取码（默认）
        #   url  — 返回完整下载地址（含 /share/download?code=...）
        share_response_type: code

        # 默认过期方式（与 default_expire_value 配合）
        # 可选：
        #   minute  — 按分钟
        #   hour    — 按小时
        #   day     — 按天（常用）
        #   week    — 按周
        #   month   — 按月
        #   year    — 按年
        #   count   — 按可下载/提取次数
        #   forever — 永不过期（此时 value 可忽略）
        default_expire_style: day

        # 默认过期数值
        # 含义随 default_expire_style 变化：
        #   day + 1     → 1 天后过期
        #   count + 5   → 可提取 5 次
        #   forever     → 可填 0
        default_expire_value: 1

        # 是否允许上传者修改过期时间
        # 可选：
        #   0 — 不允许；前台隐藏过期控件，接口强制使用上面的默认值
        #   1 — 允许修改（默认）
        #   省略本字段 — 视为允许
        allow_modify_expire: 1

    # ----- 下载 -----
    download:
        # 是否启用并发下载能力
        # 可选：0=关闭，1=开启
        enableconcurrentdownload: 1

        # 最大并发下载数
        # 范围建议：1–100
        maxconcurrentdownloads: 10

        # 下载超时时间（秒）
        # 范围建议：30–3600
        downloadtimeout: 300

        # 下载是否必须登录
        # 可选：
        #   0 — 匿名可下载（仍受单文件 RequireAuth 等限制）
        #   1 — 必须登录后才能下载
        requirelogin: 0

# -----------------------------------------------------------------------------
# storage：文件存储后端
# -----------------------------------------------------------------------------
storage:
    # 存储类型
    # 可选：
    #   local    — 本地磁盘（最常见）
    #   s3       — 兼容 S3 的对象存储
    #   webdav   — WebDAV
    #   onedrive — OneDrive
    #   nfs      — NFS
    # 空字符串：按程序默认/历史行为，建议明确写成 local
    type: ""

    # 本地存储根目录（type=local 时）
    # 空字符串：回退使用 base.datapath
    # 实际上传相对路径仍为 uploads/...，最终落在「本路径 + uploads/...」
    storagepath: ""

    # 文件目录结构（影响新上传文件的相对路径）
    # 可选：
    #   none — 平铺：uploads/提取码-文件名（默认）
    #   date — 按服务器日期：uploads/YYYY/MM/DD/提取码-文件名
    # 空字符串等同 none；仅影响新上传，不迁移旧文件
    dir_structure: none

    # ----- S3（type=s3 时填写；不用可保持 null）-----
    # 字段说明（写入非 null 对象时）：
    #   accesskeyid / secretaccesskey / bucketname — 必填
    #   endpointurl — 自定义 Endpoint（MinIO 等）
    #   regionname  — 区域，默认 auto
    #   signatureversion — s3v2 | s3v4
    #   hostname / proxy / sessiontoken — 可选
    s3: null

    # ----- WebDAV（type=webdav 时填写）-----
    # 常用：url/hostname、username、password、rootpath
    webdav: null

    # ----- OneDrive（type=onedrive 时填写）-----
    # 常用：clientid、username、password、rootpath、domain
    onedrive: null

    # ----- NFS（type=nfs 时填写）-----
    # 常用：
    #   server、path、mountpoint
    #   version: 3 | 4 | 4.1
    #   timeout: 1–3600 秒
    #   automount: 0/1，retrycount: 0–10
    nfs: null

# -----------------------------------------------------------------------------
# user：用户系统
# -----------------------------------------------------------------------------
user:
    # 是否允许用户自助注册
    # 可选：0=关闭注册，1=开放注册
    allowuserregistration: 0

    # 注册是否要求邮箱验证
    # 可选：0=不要求，1=要求
    requireemailverify: 0

    # 登录用户单文件上传大小上限（字节）
    # 示例：52428800=50MB
    useruploadsize: 52428800

    # 单用户存储配额（字节）
    # 示例：1073741824=1GB
    # 注意：部分合并逻辑下写 0 可能无法表示「不限制」，请按实际版本行为理解
    userstoragequota: 1073741824

    # 登录会话有效期（小时）
    # 示例：168=7 天；范围建议 1–8760
    sessionexpiryhours: 168

    # 每用户最多同时有效会话数
    # 范围建议：1–50
    maxsessionsperuser: 5

    # JWT 签名密钥（务必修改为足够长的随机串，建议 ≥16 字符）
    # 泄露会导致伪造登录态，生产环境请更换
    jwtsecret: FileCodeBox2025JWT

# -----------------------------------------------------------------------------
# mcp：MCP（Model Context Protocol）服务
# -----------------------------------------------------------------------------
mcp:
    # 是否启用 MCP 服务
    # 可选：0=关闭，1=开启
    # 可被环境变量 ENABLE_MCP_SERVER 覆盖
    enablemcpserver: 0

    # MCP 监听端口（字符串形式的数字）
    # 示例："8081"；可被 MCP_PORT 覆盖
    mcpport: ""

    # MCP 绑定地址
    # 示例：0.0.0.0 或 127.0.0.1；可被 MCP_HOST 覆盖
    mcphost: ""

# -----------------------------------------------------------------------------
# ui：前端界面 / 主题
# -----------------------------------------------------------------------------
ui:
    # 使用的主题目录（相对程序主题根）
    # 常见：themes/2025
    themes_select: themes/2025

    # 页面背景（CSS background 值，或主题约定的背景图路径）
    # 空字符串：使用主题默认背景
    background: ""

    # 页面说明文案（页脚/合规提示等）
    page_explain: 请勿上传或分享违法内容。根据《中华人民共和国网络安全法》、《中华人民共和国刑法》、《中华人民共和国治安管理处罚法》等相关规定。 传播或存储违法、违规内容，会受到相关处罚，严重者将承担刑事责任。本站坚决配合相关部门，确保网络内容的安全，和谐，打造绿色网络环境。

    # robots.txt 内容（服务 /robots.txt）
    robots_text: |-
        User-agent: *
        Disallow: /

    # 是否在前端展示管理入口地址
    # 可选：0=不展示，1=展示
    show_admin_addr: 0

    # 页面不透明度
    # 范围：0.0–1.0；≤0 时通常不应用透明效果
    opacity: 1

# -----------------------------------------------------------------------------
# 顶层：通知、限流、过期选项白名单等
# -----------------------------------------------------------------------------

# 首页欢迎通知标题（与 notify_content 同时有内容时才会展示）
notify_title: ""

# 首页欢迎通知内容（可含简单 HTML，视前端实现而定）
notify_content: ""

# 系统启动时间记录（毫秒时间戳字符串）；一般由程序维护，可留空
sys_start: ""

# ----- 上传限流（针对分享上传接口）-----
# upload_minute：统计窗口（分钟）；0 表示不按时间窗口限流（视中间件实现）
# upload_count ：窗口内允许的上传次数；≤0 时内部可能按 1 处理
upload_minute: 0
upload_count: 0

# ----- 取件/查询错误限流（针对提取接口）-----
# error_minute：统计窗口（分钟）；0 表示基本不限流
# error_count ：窗口内允许的错误/查询次数
error_minute: 0
error_count: 0

# 前端可选的过期方式白名单（字符串数组）
# 可选元素（与上传过期样式一致）：
#   minute, hour, day, week, month, year, count, forever
# 空数组 []：不额外限制，由前端页面自带选项兜底
# 示例：
#   expire_style: [day, hour, count, forever]
expire_style: []
